<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sophie Bluel - Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Syne:wght@400..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/login.css" />
    <script
      type="text/javascript"
      src="./assets/login.script.js"
      defer
    ></script>
  </head>
  <body>
    <header>
      <div class="biography">
        <h1>Sophie Bluel</h1>
        <h2>INTERIOR DESIGNER</h2>
      </div>
      <ul>
        <li>Projects</li>
        <li>Contact</li>
        <li id="login">Login</li>
        <li><img src="./assets/icons/instagram.png" alt="Instagram" /></li>
      </ul>
    </header>
    <main class="box">
      <nav>
        <h1 class="info">Login</h1>
        <form class="form">
          <div>
            <label for="email">Email</label
            ><input type="email" id="email" name="email" required />
          </div>
          <div>
            <label for="password">Password</label
            ><input type="password" id="password" name="password" required />
            <div id="error-message">Incorrect username or password.</div>
          </div>
          <div class="info">
            <button type="submit" id="submit-button">Sign In</button>
          </div>
        </form>
        <section>
          <div class="info"><a href="#">Forgot your password?</a></div>
        </section>
      </nav>
    </main>

    <footer>Legal Notice</footer>
  </body>
</html>
